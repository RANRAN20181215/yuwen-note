name: 爬取课文资料

on:
  workflow_dispatch:
    inputs:
      lesson_name:
        required: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install requests

    - name: Run crawler
      run: python crawler.py "${{ github.event.inputs.lesson_name }}"
